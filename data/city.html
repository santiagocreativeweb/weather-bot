<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>WXBT · Ciudad</title><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><style>
/* ============================================================================
   WXBT · design system v3 (rehecho de 0, 2026-07-15)
   Terminal de trading premium, dark. Verde = bot, cyan = mercado, ambar = vivo.
   Variables y nombres de clase IDENTICOS a v2 (el JS/markup dependen de ellos).
   ============================================================================ */
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100vh;background:#05080c;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.viz-root{
  --page:#05080c;--s1:#0d141c;--s2:#131d27;--s3:#1a2632;
  --ink:#e8f0f7;--ink2:#a6bccd;--mut:#617688;--faint:#3a4b5c;
  --grid:#182430;--base:#31465a;--bd:#213042;
  --mkt:#42c9ff;--mktw:rgba(66,201,255,.10);
  --fc:#25e6a4;--fcw:rgba(37,230,164,.10);--fcs:rgba(37,230,164,.45);
  --live:#ffc24a;--fin:#33d17e;--finw:rgba(51,209,126,.12);
  --warn:#ffb02e;--soon:#ffb02e;--red:#ff5d70;--redw:rgba(255,93,112,.10);
  --pick:#25e6a4;--t2:#ffd23e;--t3:#ff9142;
  --r:12px;--r-sm:8px;--r-xs:5px;--r-lg:16px;
  --sh-1:0 1px 2px rgba(0,0,0,.35);
  --sh-2:0 2px 4px rgba(0,0,0,.30),0 10px 26px -12px rgba(0,0,0,.6);
  --sh-pop:0 12px 40px -8px rgba(0,0,0,.7);
  --mono:"JetBrains Mono","Cascadia Mono","SF Mono","Consolas",ui-monospace,monospace;
  --sans:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
  font-family:var(--sans);color:var(--ink);
  background:
    radial-gradient(1200px 500px at 15% -10%,rgba(37,230,164,.05),transparent 60%),
    radial-gradient(1100px 460px at 100% 0%,rgba(66,201,255,.05),transparent 55%),
    var(--page);
  background-attachment:fixed;
  padding:0 24px 56px;max-width:1560px;margin:0 auto;font-size:14px;line-height:1.5;}
.viz-root a{color:inherit;text-decoration:none;}
.viz-root ::selection{background:var(--fcs);color:#04120c;}
.viz-root ::-webkit-scrollbar{width:10px;height:10px;}
.viz-root ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:6px;border:2px solid var(--page);}
.viz-root ::-webkit-scrollbar-thumb:hover{background:var(--base);}

/* ---------- topbar ---------- */
.viz-root .topbar{position:sticky;top:0;z-index:30;padding:0 0 10px;margin-bottom:6px;
  background:linear-gradient(180deg,#070d14 62%,rgba(7,13,20,.85) 88%,transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);}
.viz-root .row1{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-top:6px;}
.viz-root h1{font-size:15px;margin:0;letter-spacing:.16em;text-transform:uppercase;
  font-family:var(--mono);font-weight:700;
  background:linear-gradient(90deg,var(--fc),#7bf0cf);-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent;}
.viz-root h1::before{content:"◆";-webkit-text-fill-color:var(--fc);margin-right:8px;font-size:11px;
  animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.viz-root .clock{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--live);
  padding:3px 12px;border:1px solid rgba(255,194,74,.28);border-radius:999px;
  background:rgba(255,194,74,.06);}
.viz-root .clock small{color:var(--mut);font-weight:500;font-size:9.5px;margin-left:7px;
  font-family:var(--sans);letter-spacing:.04em;}
.viz-root .subt{color:var(--mut);font-size:11.5px;line-height:1.55;}
.viz-root .subt code,.viz-root code{font-family:var(--mono);font-size:.92em;color:var(--ink2);
  background:var(--s2);padding:1px 6px;border-radius:5px;border:1px solid var(--bd);}
.viz-root .runs{font-size:10.5px;color:var(--mut);display:flex;gap:8px;flex-wrap:wrap;
  margin-top:8px;font-family:var(--mono);align-items:center;}
.viz-root .runs span{padding:2px 8px;border-radius:6px;background:var(--s1);border:1px solid var(--grid);}
.viz-root .runs .next{color:#04120c;background:var(--fc);border-color:var(--fc);font-weight:700;}

/* ---------- filtros ---------- */
.viz-root .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.viz-root .filters select,.viz-root .filters input[type=date],.viz-root .filters input[type=search],
.viz-root .filters input[type=text]{
  background:var(--s2);color:var(--ink);border:1px solid var(--bd);border-radius:var(--r-xs);
  padding:6px 10px;font-size:12px;font-family:inherit;transition:border-color .15s,box-shadow .15s;}
.viz-root .filters select:focus,.viz-root .filters input:focus{outline:none;border-color:var(--fc);
  box-shadow:0 0 0 3px var(--fcw);}
.viz-root .chip{font-size:11px;padding:5px 12px;border-radius:999px;border:1px solid var(--bd);
  background:var(--s2);color:var(--ink2);cursor:pointer;user-select:none;transition:all .15s;font-weight:600;}
.viz-root .chip:hover{border-color:var(--base);color:var(--ink);}
.viz-root .chip.on{background:var(--fc);color:#04120c;border-color:var(--fc);
  box-shadow:0 0 16px -2px var(--fcs);}
.viz-root .count{font-size:11px;color:var(--mut);margin-left:auto;font-family:var(--mono);}
.viz-root .reset{font-size:11px;color:var(--mkt);cursor:pointer;font-weight:600;}
.viz-root .reset:hover{text-decoration:underline;}

/* ---------- section headers ---------- */
.viz-root h3.dia{font-size:11.5px;color:var(--ink);margin:26px 0 12px;text-transform:uppercase;
  letter-spacing:.16em;font-family:var(--mono);font-weight:700;display:flex;align-items:center;gap:12px;}
.viz-root h3.dia::before{content:"";width:4px;height:15px;border-radius:2px;
  background:linear-gradient(var(--fc),var(--mkt));box-shadow:0 0 10px -1px var(--fcs);}
.viz-root h3.dia::after{content:"";flex:1;height:1px;
  background:linear-gradient(90deg,var(--bd),transparent);}
.viz-root .cont-lbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.14em;
  margin:16px 0 8px;font-weight:700;display:flex;align-items:center;gap:10px;}
.viz-root .cont-lbl::after{content:"";flex:1;height:1px;background:var(--grid);}

/* ---------- cards ---------- */
.viz-root .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(352px,1fr));gap:14px;}
.viz-root .card{position:relative;background:linear-gradient(180deg,var(--s1),#0b1119);
  border:1px solid var(--bd);border-radius:var(--r);padding:14px 15px 11px;
  box-shadow:var(--sh-1);transition:transform .16s,border-color .16s,box-shadow .16s;overflow:hidden;}
.viz-root .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--base);}
.viz-root .card::after{content:"";position:absolute;inset:0 0 auto 0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);}
.viz-root .card[data-estado="encurso"]::before{background:var(--fc);box-shadow:2px 0 14px -2px var(--fcs);}
.viz-root .card[data-estado="soon"]::before{background:var(--warn);box-shadow:2px 0 14px -2px rgba(255,176,46,.6);}
.viz-root .card[data-estado="resol"]::before,.viz-root .card[data-estado="pendrev"]::before{background:var(--mkt);box-shadow:2px 0 14px -2px rgba(66,201,255,.5);}
.viz-root .card.fin::before{background:var(--fin);}
.viz-root .card:hover{transform:translateY(-2px);border-color:var(--base);box-shadow:var(--sh-2);}
.viz-root .card[data-pasado="1"]{opacity:.62;}
.viz-root .card[data-pasado="1"]:hover{opacity:1;}
.viz-root .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;gap:8px;}
.viz-root .card-head .st a{font-size:15px;font-weight:700;font-family:var(--mono);letter-spacing:.01em;}
.viz-root .card-head .st a:hover{color:var(--mkt);}
.viz-root .card-head .city{font-size:10.5px;color:var(--mut);display:block;margin-top:3px;font-weight:500;}
.viz-root .card-head .city.local{white-space:nowrap;color:var(--ink2);margin-top:2px;}
.viz-root .card-head .city.local b{color:var(--live);font-family:var(--mono);}
.viz-root .badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.viz-root .badge{font-size:9px;padding:3px 8px;border-radius:999px;background:var(--s2);
  color:var(--mut);white-space:nowrap;border:1px solid var(--bd);font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.06em;font-weight:600;line-height:1.4;}
.viz-root .badge.encurso{color:var(--fc);border-color:var(--fcs);background:var(--fcw);}
.viz-root .badge.fin{color:#04120c;background:var(--fin);border-color:var(--fin);font-weight:700;}
.viz-root .badge.soon{color:var(--soon);border-color:rgba(255,176,46,.45);background:rgba(255,176,46,.09);}
.viz-root .badge.resol{color:var(--mkt);border-color:rgba(66,201,255,.4);background:var(--mktw);font-weight:700;}
.viz-root .badge.pendrev{color:var(--warn);border-color:rgba(255,176,46,.5);background:rgba(255,176,46,.09);font-weight:700;}
.viz-root .badge.frozen{color:#04120c;background:var(--live);border-color:var(--live);font-weight:700;}
.viz-root .badge.abierto{color:var(--mkt);border-color:rgba(66,201,255,.4);background:var(--mktw);}
.viz-root .badge.wu,.viz-root .badge.tlb{cursor:pointer;}
.viz-root .badge.wu:hover{color:var(--mkt);border-color:var(--mkt);}
.viz-root .badge.tlb{color:var(--ink2);}
.viz-root .badge.tlb:hover{color:var(--fc);border-color:var(--fcs);background:var(--fcw);}

/* ---------- trio de stats ---------- */
.viz-root .trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 0 10px;}
.viz-root .stat{background:var(--s2);border:1px solid var(--grid);border-radius:var(--r-sm);padding:8px 10px 7px;}
.viz-root .stat .lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;font-weight:600;}
.viz-root .stat .val{font-size:19px;font-weight:700;font-family:var(--mono);line-height:1.1;letter-spacing:-.01em;}
.viz-root .stat .sub{font-size:9.5px;color:var(--ink2);font-family:var(--mono);margin-top:1px;}
.viz-root .stat.bot{border-color:var(--fcs);background:linear-gradient(180deg,var(--fcw),transparent);}
.viz-root .stat.bot .val{color:var(--fc);}
.viz-root .stat.live .val{color:var(--live);}
.viz-root .stat.finres .val{color:var(--fin);}
.viz-root .models{font-size:10.5px;color:var(--mut);margin:0 0 8px;font-family:var(--mono);
  padding:6px 9px;background:var(--s1);border:1px solid var(--grid);border-radius:var(--r-xs);}
.viz-root .models b{color:var(--ink2);font-weight:700;}

/* ---------- estados / warnings ---------- */
.chg{animation:chg 2.6s ease-out;}
@keyframes chg{0%{background:var(--fcw);}100%{background:transparent;}}
.viz-root .lostwarn{font-size:10.5px;color:var(--ink2);background:var(--redw);border-radius:var(--r-xs);
  border:1px solid rgba(255,93,112,.22);padding:6px 9px;margin:0 0 8px;}
.viz-root .wstat{font-size:11px;font-weight:600;padding:6px 10px;border-radius:var(--r-xs);margin:0 0 9px;
  font-family:var(--mono);border:1px solid transparent;display:flex;align-items:center;gap:6px;}
.viz-root .wstat.ok{color:var(--fin);background:var(--finw);border-color:rgba(51,209,126,.28);}
.viz-root .wstat.late{color:var(--warn);background:rgba(255,176,46,.09);border-color:rgba(255,176,46,.28);}
.viz-root .wstat.closed{color:var(--red);background:var(--redw);border-color:rgba(255,93,112,.28);}
.viz-root .wstat.pend{color:var(--warn);background:rgba(255,176,46,.11);border-color:rgba(255,176,46,.32);}
.viz-root .wstat .wtime{color:var(--ink);font-weight:700;}

/* ---------- acciones / botones ---------- */
.viz-root .actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.viz-root .qbtn{font-size:11.5px;padding:6px 13px;border-radius:999px;border:1px solid var(--bd);
  background:var(--s2);color:var(--ink);cursor:pointer;font-family:inherit;font-weight:600;
  display:inline-flex;align-items:center;gap:5px;transition:all .14s;}
.viz-root .qbtn:hover{border-color:var(--fc);color:var(--fc);background:var(--fcw);transform:translateY(-1px);}
.viz-root .qbtn.dl{border-color:rgba(51,209,126,.5);color:var(--fin);}
.viz-root .qbtn:disabled{opacity:.4;cursor:not-allowed;}
.viz-root .qbtn.busy{opacity:.6;pointer-events:none;}
.viz-root .qbtn.busy::after{content:"";width:10px;height:10px;border:2px solid currentColor;
  border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.viz-root .qmsg{font-size:11px;color:var(--mut);margin-left:4px;}
.viz-root .qmsg.ok{color:var(--fin);} .viz-root .qmsg.err{color:var(--red);}

/* ---------- tabla de buckets ---------- */
.viz-root table.bkts{border-collapse:collapse;width:100%;font-size:11.5px;margin-top:2px;}
.viz-root table.bkts th{font-size:8px;color:var(--mut);text-align:left;font-weight:700;
  text-transform:uppercase;letter-spacing:.09em;padding:3px 5px;border-bottom:1px solid var(--bd);}
.viz-root table.bkts td{padding:3.5px 5px;font-family:var(--mono);font-size:11px;
  border-bottom:1px solid rgba(24,36,48,.6);}
.viz-root table.bkts tr:last-child td{border-bottom:0;}
.viz-root table.bkts tr:hover td{background:var(--s2);}
.viz-root table.bkts .num{text-align:right;font-variant-numeric:tabular-nums;}
.viz-root table.bkts td .miss{text-decoration:line-through;text-decoration-thickness:1.5px;color:var(--mut);}
.viz-root .track{background:var(--grid);border-radius:3px;height:8px;min-width:56px;display:block;overflow:hidden;}
.viz-root .fill{background:var(--mkt);height:100%;border-radius:3px;min-width:2px;display:block;
  box-shadow:0 0 8px -1px rgba(66,201,255,.5);}
.viz-root .fill.g1{background:var(--fin);box-shadow:0 0 8px -1px rgba(51,209,126,.5);}
.viz-root .fill.y2{background:var(--t2);box-shadow:0 0 8px -1px rgba(255,210,62,.45);}
.viz-root .fill.o3{background:var(--t3);box-shadow:0 0 8px -1px rgba(255,145,66,.45);}
.viz-root .fill.lost{background:var(--base);opacity:.4;box-shadow:none;}
.viz-root .dot{display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--fc);}
.viz-root .dot.g1{background:var(--pick);} .viz-root .dot.y2{background:var(--t2);} .viz-root .dot.o3{background:var(--t3);}
.viz-root .edgehi{font-weight:700;color:var(--fc);}
.viz-root tr.lostrow td{color:var(--mut);text-decoration:line-through;text-decoration-thickness:1px;}
.viz-root tr.lostrow td:first-child,.viz-root tr.lostrow td:nth-child(3){text-decoration:none;}
.viz-root .chipno{font-size:8.5px;font-weight:700;color:var(--warn);border:1px solid rgba(255,176,46,.4);
  border-radius:4px;padding:1px 5px;font-family:var(--mono);}
.viz-root .okc{color:var(--fin);font-weight:800;} .viz-root .badc{color:var(--red);font-weight:800;}
.viz-root .verdict{display:flex;gap:10px;align-items:center;font-size:12px;margin:6px 0 2px;font-family:var(--mono);}
.viz-root .verdict .ok{color:var(--fin);font-weight:700;} .viz-root .verdict .bad{color:var(--red);font-weight:700;}

/* ---------- accordion ---------- */
.viz-root details.acc{margin-top:10px;border-top:1px solid var(--grid);padding-top:8px;}
.viz-root details.acc summary{cursor:pointer;font-size:10.5px;color:var(--mut);list-style:none;font-weight:600;}
.viz-root details.acc summary::before{content:"▸ ";transition:transform .2s;}
.viz-root details.acc[open] summary::before{content:"▾ ";}
.viz-root details.acc .inner{font-size:11px;color:var(--ink2);padding:8px 2px 2px;line-height:1.65;animation:accIn .2s ease;}
@keyframes accIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.viz-root .empty{font-size:11px;color:var(--mut);font-style:italic;padding:8px 0;}

/* ---------- paneles ---------- */
.viz-root .timing{background:linear-gradient(180deg,var(--s1),#0b1119);border:1px solid var(--bd);
  border-radius:var(--r-lg);padding:16px 18px;margin-top:24px;font-size:12px;color:var(--ink2);box-shadow:var(--sh-1);}
.viz-root .timing h4{margin:0 0 10px;font-size:13px;color:var(--ink);font-weight:700;letter-spacing:.01em;
  display:flex;align-items:center;gap:8px;}
.viz-root .timing table{border-collapse:collapse;font-size:11px;}
.viz-root .timing td,.viz-root .timing th{padding:3px 14px 3px 0;font-variant-numeric:tabular-nums;color:var(--ink2);text-align:left;}
.viz-root .timing th{color:var(--mut);font-size:9px;text-transform:uppercase;letter-spacing:.06em;}
.viz-root .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:6px 0 10px;}
.viz-root .scard{background:var(--s2);border:1px solid var(--grid);border-radius:var(--r-sm);padding:11px 13px;
  transition:border-color .15s,transform .15s;}
.viz-root .scard:hover{border-color:var(--base);transform:translateY(-1px);}
.viz-root .scard .lbl{font-size:8.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
.viz-root .scard .big{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1.15;color:var(--fc);letter-spacing:-.02em;}
.viz-root .scard .sub{font-size:10px;color:var(--ink2);font-family:var(--mono);}
.viz-root .scard.y .big{color:var(--t2);} .viz-root .scard.o .big{color:var(--t3);} .viz-root .scard.bad .big{color:var(--red);}
.viz-root .cchips{display:flex;gap:8px;flex-wrap:wrap;}
.viz-root .cchip{font-size:11px;color:var(--ink2);background:var(--s2);border:1px solid var(--grid);
  border-radius:999px;padding:4px 11px;font-family:var(--mono);}
.viz-root .cchip b{color:var(--fc);}

/* ---------- registro de auditoria ---------- */
.viz-root .alog{display:flex;flex-direction:column;gap:1px;max-height:340px;overflow-y:auto;}
.viz-root .arow{display:flex;gap:12px;align-items:baseline;font-size:11.5px;padding:4px 2px;
  border-bottom:1px solid var(--grid);font-variant-numeric:tabular-nums;}
.viz-root .arow .at{color:var(--mut);min-width:82px;font-size:10.5px;font-family:var(--mono);}
.viz-root .arow .ast{font-weight:700;min-width:46px;font-family:var(--mono);}
.viz-root .arow .ad{color:var(--mut);min-width:78px;}
.viz-root .arow .aval{color:var(--ink2);font-family:var(--mono);}
.viz-root .arow .aval b{color:var(--ink);}
.viz-root .arow .up{color:var(--red);font-weight:700;} .viz-root .arow .down{color:var(--mkt);font-weight:700;}
.viz-root .arow .frzt{color:var(--live);font-size:10px;border:1px solid rgba(255,194,74,.3);border-radius:999px;padding:0 7px;}

/* ---------- tooltip ---------- */
#viz-tooltip{position:fixed;pointer-events:none;background:#eef5fb;color:#0a1017;font-size:11.5px;
  padding:6px 10px;border-radius:7px;opacity:0;transition:opacity .12s;z-index:1000;max-width:340px;
  white-space:normal;font-family:var(--sans);line-height:1.45;box-shadow:0 8px 30px -6px rgba(0,0,0,.6);}
.viz-root .hidden{display:none !important;}

/* ---------- timeline modal (fuera de .viz-root) ---------- */
#tl-modal{position:fixed;inset:0;background:rgba(3,6,9,.82);z-index:2000;display:flex;
  align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#tl-modal .tl-box{background:linear-gradient(180deg,#0e151d,#0a1017);border:1px solid #2b3f52;
  border-radius:16px;width:min(580px,93vw);max-height:86vh;overflow-y:auto;padding:18px 20px;
  color:#e8f0f7;font-family:"Inter","Segoe UI",sans-serif;box-shadow:0 20px 60px -10px rgba(0,0,0,.8);}
#tl-modal .tl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;
  font-family:"JetBrains Mono","Cascadia Mono",monospace;font-size:13px;color:#25e6a4;letter-spacing:.05em;font-weight:700;}

  var freezePlugin={id:'frz',afterDraw:function(ch){

    function xpix(i){return a.left+(i/(d.n-1))*(a.right-a.left);}
    function vline(i,color,lbl){if(i<0||i>d.n-1)return;var px=xpix(i);

    if(d.cursor!=null){var px=xpix(d.cursor);ctx.save();ctx.strokeStyle='#e8f0f7';ctx.lineWidth=1;
      ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(px,a.top);ctx.lineTo(px,a.bottom);ctx.stroke();ctx.restore();}

  function sliceInfo(C){var nAll=C.tl.times.length,keep=tlState.hours*2+1,i0=Math.max(0,nAll-keep);return {i0:i0,times:C.tl.times.slice(i0),n:C.tl.times.length-i0};}
  function idxOf(times,ep){var n=times.length,best=-1,bd=1e18;for(var i=0;i<n;i++){var dd=Math.abs(times[i]-ep);if(dd<bd){bd=dd;best=i;}}return (ep<times[0]-1800||ep>times[n-1]+1800)?-1:best;}
  function buildTL(C){

    var C=DATA.cities[code]; if(!C){document.getElementById('cbody').innerHTML='<p class="none">Ciudad no encontrada</p>';return;}
    document.getElementById('ctitle').innerHTML='🏙 '+esc(C.city)+' · '+C.code;
    document.getElementById('clinks').innerHTML='<a class="chip" href="cities.html">← ciudades</a> <a class="chip" href="'+C.markets[0].url+'" target="_blank">📈 Polymarket ↗</a> <a class="chip" href="'+C.markets[0].wu+'" target="_blank">'+(C.code==='HKO'?'🇭🇰 HKO ↗':'🌡 WU ↗')+'</a> <a class="chip" href="https://www.windy.com/'+C.lat.toFixed(3)+'/'+C.lon.toFixed(3)+'" target="_blank">🌀 Windy ↗</a>';
    document.getElementById('cgen').innerHTML='🕒 '+DATA.generated+' (AR) · '+esc(C.country)+' · '+esc(C.cont)+' · '+C.resol;
    document.getElementById('cbody').innerHTML=statCards(C)+tlBox(C)+
      '<div class="cols"><div class="col">'+mktBox(C)+picksBox(C)+'</div><div class="col">'+pwsBox(C)+histBox(C)+daysBox(C)+'</div></div>'+
      '<div class="panelbox"><h4>📈 Últimos 30 días — obs real vs pick congelado</h4><div class="chartbox"><canvas id="histchart"></canvas></div></div>';
    tlState={mode:'graph',hours:48,cursor:null,hidden:{}};
    drawMap(C);
    if(C.tl&&C.tl.labels.length){buildTL(C);wireTL(C);}
    wireHist();
    wireDays(C);
    drawObs(C);
  }
  render();
  var refN=90;
  setInterval(function(){if(!document.getElementById('autoref').checked||document.hidden)return;autoRefresh(function(){if(DATA.cities[code])render();});},refN*1000);
  setInterval(function(){var t=document.getElementById('reftxt');if(t)t.textContent=(document.getElementById('autoref').checked?'cada '+refN+'s':'pausado');},1000);
})();
</script></body></html>
